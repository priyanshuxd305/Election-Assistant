<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>Election Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#222;
}

.app {
  width:420px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  overflow:hidden;
}

.header {
  background:#4facfe;
  color:#fff;
  padding:15px;
  text-align:center;
}

.chat {
  height:320px;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.bot { background:#f1f1f1; }
.user { background:#4facfe; color:white; margin-left:auto; }

.controls {
  padding:10px;
  text-align:center;
}

button {
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#4facfe;
  color:white;
  cursor:pointer;
}

button:focus {
  outline:2px solid black;
}
</style>
</head>

<body>

<div class="app" role="application">
  <div class="header">🗳 Election Assistant</div>

  <div id="chatBox" class="chat" aria-live="polite"></div>

  <div id="controls" class="controls">
    <button onclick="App.start()" aria-label="Start">Start</button>
    <button onclick="App.runTests()">Run Tests</button>
  </div>
</div>

<script>
const App = (() => {

  let state = {
    name: "",
    step: "start"
  };

  const chatBox = document.getElementById("chatBox");
  const controls = document.getElementById("controls");

  function sanitize(str){
    return str.replace(/[<>]/g, "").trim();
  }

  function createMsg(type, text){
    const el = document.createElement("div");
    el.className = "msg " + type;
    el.textContent = text;
    return el;
  }

  function renderMsg(type, text){
    const fragment = document.createDocumentFragment();
    fragment.appendChild(createMsg(type, text));
    chatBox.appendChild(fragment);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function renderOptions(options){
    controls.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.textContent = opt.label;
      btn.onclick = opt.action;
      btn.setAttribute("aria-label", opt.label);
      controls.appendChild(btn);
    });
  }

  function greet(){
    const msgs = [
      "Hey 👋 Let's understand elections!",
      "Hi 😊 Ready to explore voting?",
      "Welcome! I'll guide you step by step."
    ];
    return msgs[Math.floor(Math.random()*msgs.length)];
  }

  function start(){
    chatBox.innerHTML = "";
    renderMsg("bot", greet());
    askName();
  }

  function askName(){
    renderMsg("bot", "What should I call you?");
    controls.innerHTML = `
      <label>Name:</label><br>
      <input id="nameInput">
      <button onclick="App.saveName()">OK</button>
    `;
  }

  function saveName(){
    const val = document.getElementById("nameInput").value;
    if(!val.trim()) return;

    state.name = sanitize(val);
    renderMsg("user", state.name);
    renderMsg("bot", "Nice to meet you, " + state.name + "!");

    showMenu();
  }

  function showMenu(){
    renderMsg("bot","What do you want to explore?");
    renderOptions([
      {label:"Eligibility", action:checkAge},
      {label:"Registration", action:showRegistration},
      {label:"Voting", action:showVoting}
    ]);
  }

  function checkAge(){
    renderMsg("bot","Are you 18+?");
    renderOptions([
      {label:"Yes", action:() => handleAge(true)},
      {label:"No", action:() => handleAge(false)}
    ]);
  }

  function handleAge(flag){
    renderMsg("user", flag ? "Yes" : "No");
    renderMsg("bot", flag ? "You're eligible to vote!" : "You need to be 18+.");
    showExtras();
  }

  function showRegistration(){
    renderMsg("bot","Steps:");
    renderMsg("bot","Form → Documents → Voter ID");
    showExtras();
  }

  function showVoting(){
    renderMsg("bot","Voting day:");
    renderMsg("bot","Booth → Verify → Vote → Ink mark");
    showExtras();
  }

  function showTimeline(){
    renderMsg("bot","Timeline:");
    renderMsg("bot","Announcement → Campaign → Voting → Result");
  }

  function showExtras(){
    renderOptions([
      {label:"Timeline", action:showTimeline},
      {label:"Menu", action:showMenu},
      {label:"Restart", action:start}
    ]);
  }

  function runTests(){
    console.assert(typeof start === "function","Start exists");
    console.assert(typeof sanitize === "function","Sanitize works");
    alert("Tests passed!");
  }

  // accessibility (Enter key)
  document.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
      const btn = document.querySelector("button");
      if(btn) btn.click();
    }
  });

  return {
    start,
    saveName,
    runTests
  };

})();
</script>

</body>
</html>
