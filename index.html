<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google" content="notranslate">
<meta charset="UTF-8">
<title>Election Assistant</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- (Optional) Google Analytics placeholder -->
<script>
  // You can add GA ID if needed
  function track(event){
    console.log("Tracking:", event);
  }
</script>

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  display:flex; justify-content:center; align-items:center;
  height:100vh; color:#222;
}

.app {
  width:420px;
  background:#fff;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  overflow:hidden;
}

.header {
  background:#4facfe;
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.chat {
  height:320px;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:8px 0;
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.bot { background:#f1f1f1; }
.user { background:#4facfe; color:white; margin-left:auto; }

.controls {
  padding:10px;
  text-align:center;
}

button {
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#4facfe;
  color:white;
  cursor:pointer;
}

button:focus {
  outline:2px solid #000;
}
</style>
</head>

<body>

<div class="app" role="application">
  <div class="header">🗳 Election Assistant</div>

  <div id="chatBox" class="chat" aria-live="polite"></div>

  <div id="controls" class="controls">
    <button onclick="App.start()" aria-label="Start assistant">Start</button>
  </div>
</div>

<script>

/* ---------- CORE MODULE ---------- */
const App = (() => {

  let state = {
    UserName: "",
    currentstep: "start"
  };

  const chatBox = document.getElementById("chatBox");
  const controls = document.getElementById("controls");

  /* ---------- UTIL ---------- */

  function sanitize(str){
    return str.replace(/[<>]/g, "");trim():
  }

  function createMsg(type, text){
    const el = document.createElement("div");
    el.className = "msg " + type;
    el.textContent = text;
    return el;
  }

  function renderMsg(type, text){
    const fragment = document.createDocumentFragment();
fragment.appendChild(createMsg(type, text));
chatBox.appendChild(fragment);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function renderOptions(options){
    controls.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.textContent = opt.label;
      btn.onclick = opt.action;
      btn.setAttribute("aria-label", opt.label);
      controls.appendChild(btn);
    });
  }

  function greet(){
    const arr = [
      "Hey 👋 let's understand elections!",
      "Hi 😊 I'll guide you step by step.",
      "Welcome! Let's simplify voting."
    ];
    return arr[Math.floor(Math.random()*arr.length)];
  }

  /* ---------- FLOW ---------- */

  function start(){
    chatBox.innerHTML = "";
    renderMsg("bot", greet());
    askName();
  }

  function askName(){
    renderMsg("bot", "What should I call you?");
    controls.innerHTML = `
      <label for="nameInput">Name:</label><br>
      <input id="nameInput" aria-label="Enter name">
      <button onclick="App.saveName()">OK</button>
    `;
  }

  function saveName(){
    const val = document.getElementById("nameInput").value.trim();
    if(!val) return;

    state.name = sanitize(val);
    renderMsg("user", state.name);
    renderMsg("bot", `Nice to meet you, ${state.name}!`);

    showMenu();
  }

  function showMenu(){
    renderMsg("bot","What would you like to explore?");
    renderOptions([
      {label:"Eligibility", action:checkAge},
      {label:"Registration", action:showRegistration},
      {label:"Voting Process", action:showVoting}
    ]);
  }

  function checkAge(){
    renderMsg("bot","Are you 18 or above?");
    renderOptions([
      {label:"Yes", action:() => handleAge(true)},
      {label:"No", action:() => handleAge(false)}
    ]);
  }

  function handleAge(flag){
    renderMsg("user", flag ? "Yes" : "No");
    renderMsg("bot", flag ? "You're eligible to vote!" : "You need to be 18+.");

    showExtras();
  }

  function showRegistration(){
    renderMsg("bot","Steps to register:");
    renderMsg("bot","Form → Documents → Voter ID");
    showExtras();
  }

  function showVoting(){
    renderMsg("bot","Voting day steps:");
    renderMsg("bot","Booth → Verify → Vote → Ink mark");
    showExtras();
  }

  function showTimeline(){
    renderMsg("bot","Election timeline:");
    renderMsg("bot","Announcement → Campaign → Voting → Result");
  }

  function showExtras(){
    renderOptions([
      {label:"Timeline", action:showTimeline},
      {label:"Menu", action:showMenu},
      {label:"Restart", action:start}
    ]);
  }

  /* ---------- TESTING ---------- */

  function runTests(){
    console.assert(typeof start === "function","Start exists");
    console.assert(typeof sanitize === "function","Sanitize exists");
    console.log("Basic tests passed");
  }

  return {
    start,
    saveName,
    runTests
  };

})();

</script>

</body>
</html>
