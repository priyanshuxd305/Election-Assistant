<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Election Guide Assistant</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #89f7fe, #66a6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  overflow: hidden;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.chat {
  height: 320px;
  overflow-y: auto;
  padding: 15px;
}

.msg {
  margin: 8px 0;
  padding: 10px;
  border-radius: 10px;
  max-width: 75%;
}

.bot {
  background: #f1f1f1;
}

.user {
  background: #007bff;
  color: white;
  margin-left: auto;
}

.controls {
  padding: 10px;
  text-align: center;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #007bff;
  color: white;
  cursor: pointer;
}

input {
  padding: 8px;
  margin-top: 5px;
  width: 70%;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">🗳 Election Guide</div>
  <div class="chat" id="chatBox"></div>
  <div class="controls" id="controlPanel">
    <button onclick="beginChat()">Start</button>
  </div>
</div>

<script>
let chatBox = document.getElementById("chatBox");
let controlPanel = document.getElementById("controlPanel");
let userName = "";

function bot(msg){
  chatBox.innerHTML += `<div class="msg bot">${msg}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function user(msg){
  chatBox.innerHTML += `<div class="msg user">${msg}</div>`;
  chatBox.scrollTop = chatBox.scrollHeight;
}

function beginChat(){
  chatBox.innerHTML = "";
  bot("Hey! 👋 I'm here to make elections super easy to understand.");
  setTimeout(askUserName, 500);
}

function askUserName(){
  bot("Before we start, what's your name?");
  controlPanel.innerHTML = `
    <input id="nameInput" placeholder="Enter your name">
    <button onclick="saveUserName()">OK</button>
  `;
}

function saveUserName(){
  let name = document.getElementById("nameInput").value;
  if(name.trim() === "") return;
  user(name);
  userName = name;
  bot("Nice to meet you, " + userName + "! 😊");
  setTimeout(checkAge, 500);
}

function checkAge(){
  bot("Quick question — are you 18 or above?");
  controlPanel.innerHTML = `
    <button onclick="eligible()">Yes</button>
    <button onclick="notEligible()">No</button>
  `;
}

function notEligible(){
  user("No");
  bot("No worries! You’ll be able to vote once you turn 18 👍");
  restartOption();
}

function eligible(){
  user("Yes");
  bot("Great! That means you can take part in voting 🗳");
  setTimeout(checkRegistration, 500);
}

function checkRegistration(){
  bot("Are you already registered as a voter?");
  controlPanel.innerHTML = `
    <button onclick="registered()">Yes</button>
    <button onclick="notRegistered()">No</button>
  `;
}

function notRegistered(){
  user("No");
  bot("Alright, here's how you can register:");
  bot("1. Fill the voter registration form\n2. Upload required documents\n3. Receive your voter ID");
  showExtras();
}

function registered(){
  user("Yes");
  bot("Awesome! Here's what happens on voting day:");
  bot("1. Visit your polling booth\n2. Verify your ID\n3. Cast your vote using EVM\n4. Get ink mark");
  showExtras();
}

function showTimeline(){
  bot("Here’s a quick look at the election timeline:");
  bot("• Announcement\n• Campaigning\n• Voting Day\n• Result Declaration");
}

function showExtras(){
  controlPanel.innerHTML = `
    <button onclick="showTimeline()">View Timeline</button>
    <button onclick="beginChat()">Restart</button>
  `;
}

function restartOption(){
  controlPanel.innerHTML = `
    <button onclick="beginChat()">Restart</button>
  `;
}
</script>

</body>
</html>
